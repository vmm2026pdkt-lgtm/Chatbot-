<!DOCTYPE html>
<html lang="ta">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>சிலம்பம் AI பயிற்சியாளர்</title>
  <link href="https://fonts.googleapis.com/css2?family=Tiro+Tamil:ital@0;1&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --saffron:   #E8610A;
      --deep:      #1A0A00;
      --gold:      #C8860A;
      --cream:     #FDF3E3;
      --bark:      #3B1F07;
      --glow:      #FF8C2A;
      --msg-user:  #3B1F07;
      --msg-bot:   #1A0800;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--deep);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Tiro Tamil', serif;
      overflow: hidden;
    }

    /* Animated fire-sparks background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 110%, #7A2A0044 0%, transparent 70%),
        radial-gradient(ellipse 80% 60% at 20% 80%, #C84A0022 0%, transparent 60%),
        radial-gradient(ellipse 50% 30% at 80% 90%, #E86A0011 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .sparks {
      position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 1;
    }
    .spark {
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--glow);
      opacity: 0;
      animation: rise linear infinite;
    }
    @keyframes rise {
      0%   { transform: translateY(0) scale(1); opacity: 0.9; }
      100% { transform: translateY(-90vh) scale(0); opacity: 0; }
    }

    .wrapper {
      position: relative; z-index: 2;
      width: min(420px, 96vw);
      display: flex; flex-direction: column; gap: 0;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, var(--bark) 0%, #5A2A08 100%);
      border: 1px solid var(--gold);
      border-bottom: none;
      border-radius: 16px 16px 0 0;
      padding: 18px 20px 14px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), var(--glow), var(--gold), transparent);
    }
    .header-icon { font-size: 2.2rem; line-height: 1; display: block; }
    .header-title {
      font-family: 'Cinzel Decorative', cursive;
      color: var(--glow);
      font-size: 1.15rem;
      letter-spacing: 0.05em;
      text-shadow: 0 0 20px #FF8C2A66;
      margin: 6px 0 2px;
    }
    .header-sub {
      color: #C8860A99;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
    }

    /* Chat area */
    #chatbox {
      background: var(--msg-bot);
      border-left: 1px solid var(--gold);
      border-right: 1px solid var(--gold);
      height: 420px;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex; flex-direction: column; gap: 12px;
      scroll-behavior: smooth;
    }
    #chatbox::-webkit-scrollbar { width: 5px; }
    #chatbox::-webkit-scrollbar-track { background: transparent; }
    #chatbox::-webkit-scrollbar-thumb { background: var(--bark); border-radius: 4px; }

    .bubble {
      max-width: 84%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 0.9rem;
      line-height: 1.65;
      animation: pop 0.25s ease;
    }
    @keyframes pop {
      from { opacity: 0; transform: translateY(8px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }

    .bubble.user {
      align-self: flex-end;
      background: linear-gradient(135deg, #7A3010, #A84018);
      color: var(--cream);
      border-bottom-right-radius: 4px;
      box-shadow: 0 2px 12px #E8610A33;
    }
    .bubble.user .label {
      font-size: 0.68rem; color: #FFB07A; margin-bottom: 3px; font-style: italic;
    }

    .bubble.bot {
      align-self: flex-start;
      background: linear-gradient(135deg, #2A1005, #3B1A0A);
      color: #F5DFC0;
      border: 1px solid #6A3A1044;
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 14px #00000066;
    }
    .bubble.bot .label {
      font-size: 0.68rem; color: var(--gold); margin-bottom: 4px; font-style: italic;
    }

    /* Typing indicator */
    .typing-bubble {
      align-self: flex-start;
      background: linear-gradient(135deg, #2A1005, #3B1A0A);
      border: 1px solid #6A3A1044;
      border-radius: 14px; border-bottom-left-radius: 4px;
      padding: 12px 16px;
      display: flex; align-items: center; gap: 5px;
    }
    .typing-bubble span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--gold); display: inline-block;
      animation: bounce 1.1s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.18s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40%            { transform: translateY(-6px); opacity: 1; }
    }

    /* Input row */
    .inputbar {
      background: var(--bark);
      border: 1px solid var(--gold);
      border-top: none;
      border-radius: 0 0 16px 16px;
      padding: 12px;
      display: flex; gap: 8px; align-items: center;
    }
    #input {
      flex: 1;
      background: #2A1005;
      border: 1px solid #6A3A1088;
      border-radius: 10px;
      color: var(--cream);
      font-family: 'Tiro Tamil', serif;
      font-size: 0.88rem;
      padding: 10px 13px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #input::placeholder { color: #A0603088; }
    #input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px #C8860A22;
    }

    #sendBtn {
      background: linear-gradient(135deg, var(--saffron), var(--gold));
      border: none; border-radius: 10px;
      color: white; font-size: 1.25rem;
      width: 44px; height: 44px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, box-shadow 0.15s;
      flex-shrink: 0;
      box-shadow: 0 2px 10px #E8610A55;
    }
    #sendBtn:hover  { transform: scale(1.07); box-shadow: 0 4px 18px #E8610A88; }
    #sendBtn:active { transform: scale(0.95); }
    #sendBtn:disabled { opacity: 0.45; cursor: default; transform: none; }

    .api-row {
      margin-bottom: 8px;
      display: flex; gap: 6px; align-items: center;
    }
    #apiKey {
      flex: 1;
      background: #2A1005;
      border: 1px solid #6A3A1088;
      border-radius: 10px;
      color: var(--cream);
      font-family: monospace;
      font-size: 0.78rem;
      padding: 8px 11px;
      outline: none;
      transition: border-color 0.2s;
    }
    #apiKey::placeholder { color: #A0603066; }
    #apiKey:focus { border-color: var(--gold); }
    .api-label {
      color: #C8860A; font-size: 0.7rem; white-space: nowrap;
    }
  </style>
</head>
<body>

<!-- Sparks -->
<div class="sparks" id="sparks"></div>

<div class="wrapper">

  <!-- Header -->
  <div class="header">
    <span class="header-icon">🥢</span>
    <div class="header-title">SILAMBAM</div>
    <div class="header-sub">AI · பயிற்சியாளர் · Trainer</div>
  </div>

  <!-- Chat -->
  <div id="chatbox"></div>

  <!-- Input -->
  <div class="inputbar">
    <div style="flex:1; display:flex; flex-direction:column; gap:6px;">
      <div class="api-row">
        <span class="api-label">🔑 API Key:</span>
        <input id="apiKey" type="password" placeholder="sk-ant-..." />
      </div>
      <div style="display:flex; gap:8px;">
        <input id="input" placeholder="உங்கள் கேள்வி இங்கே எழுதுங்கள்..." autocomplete="off" />
        <button id="sendBtn" onclick="send()" title="Send">➤</button>
      </div>
    </div>
  </div>

</div>

<script>
// ── Sparks ──
const sparksEl = document.getElementById('sparks');
for (let i = 0; i < 22; i++) {
  const s = document.createElement('div');
  s.className = 'spark';
  s.style.left = Math.random() * 100 + 'vw';
  s.style.bottom = (Math.random() * 20) + 'vh';
  s.style.animationDuration = (4 + Math.random() * 7) + 's';
  s.style.animationDelay  = (Math.random() * 8) + 's';
  s.style.width = s.style.height = (2 + Math.random() * 3) + 'px';
  s.style.background = Math.random() > 0.5 ? '#FF8C2A' : '#FFD080';
  sparksEl.appendChild(s);
}

// ── Chat helpers ──
const chatbox  = document.getElementById('chatbox');
const inputEl  = document.getElementById('input');
const sendBtn  = document.getElementById('sendBtn');
const apiKeyEl = document.getElementById('apiKey');

let typingEl = null;

function addBubble(role, text) {
  const div = document.createElement('div');
  div.className = 'bubble ' + role;
  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = role === 'user' ? 'நீங்கள்' : '⚔️ பயிற்சியாளர்';
  div.appendChild(label);
  const content = document.createElement('div');
  content.textContent = text;
  div.appendChild(content);
  chatbox.appendChild(div);
  chatbox.scrollTop = chatbox.scrollHeight;
  return div;
}

function showTyping() {
  typingEl = document.createElement('div');
  typingEl.className = 'typing-bubble';
  typingEl.innerHTML = '<span></span><span></span><span></span>';
  chatbox.appendChild(typingEl);
  chatbox.scrollTop = chatbox.scrollHeight;
}

function hideTyping() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

// ── Send ──
async function send() {
  const msg    = inputEl.value.trim();
  const apiKey = apiKeyEl.value.trim();

  if (!msg) return;
  if (!apiKey) {
    alert('முதலில் உங்கள் Anthropic API Key உள்ளிடவும்.');
    apiKeyEl.focus(); return;
  }

  inputEl.value = '';
  sendBtn.disabled = true;
  addBubble('user', msg);
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        system: `நீங்கள் ஒரு அனுபவமிக்க சிலம்பம் பயிற்சியாளர். சிலம்பம் என்பது தமிழ்நாட்டின் பாரம்பரிய ஆயுத போர் கலை. 

எப்போதும் தமிழிலேயே பதிலளிக்கவும். நண்பரான, ஆர்வமூட்டும் தொனியில் பேசவும். 

நீங்கள் உதவக்கூடிய விஷயங்கள்:
- சிலம்பம் வரலாறு மற்றும் தோற்றம்
- அடிப்படை மற்றும் மேம்பட்ட நுட்பங்கள்
- உடல் தயாரிப்பு பயிற்சிகள்
- சிலம்பத்தின் வகைகள் (சிறு தடி, நெடுந்தடி, வாள் போர் போன்றவை)
- போட்டிகள் மற்றும் நிகழ்ச்சிகள்
- பாதுகாப்பு குறிப்புகள்`,
        messages: [{ role: 'user', content: msg }]
      })
    });

    const data = await res.json();

    if (data.error) throw new Error(data.error.message);

    const reply = data.content?.[0]?.text || 'மன்னிக்கவும், பதில் கிடைக்கவில்லை.';
    hideTyping();
    addBubble('bot', reply);

  } catch (err) {
    hideTyping();
    addBubble('bot', '⚠️ பிழை ஏற்பட்டது: ' + err.message);
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

// Enter key
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

// Welcome message
setTimeout(() => {
  addBubble('bot', 'வணக்கம்! 🥢 நான் உங்கள் சிலம்பம் AI பயிற்சியாளர். சிலம்பம் பற்றி எந்த கேள்வியும் கேளுங்கள் — நான் உதவ தயாராக இருக்கிறேன்!');
}, 400);
</script>
</body>
</html>
